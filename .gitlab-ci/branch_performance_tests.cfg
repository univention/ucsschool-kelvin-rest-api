[Global]
parallel: true
recover: 4
openstack_flavor_name: UNIVENTION-8V-8-100s
extra_label: ucsschool-kelvin-rest-api-performance-[ENV:CI_COMMIT_REF_SLUG]

environment:
 TARGET_VERSION=[ENV:TARGET_VERSION]
 UCS_ENV_KELVIN_HOST="master.ucs.test"

[singleserver]
openstack_image_name: [ENV:TARGET_VERSION]-dev-ucsschool-singleserver
command1:
 . utils.sh && add_tech_key_authorized_keys
 . utils.sh && basic_setup
 . utils.sh && basic_setup_ucs_joined [SELF_IP]
command2:
 # Install branch app
 . utils.sh && switch_to_test_app_center
 univention-app update
 univention-app remove ucsschool-kelvin-rest-api
 . utils.sh && install_apps provisioning-service
 . utils.sh && install_apps ucsschool-kelvin-rest-api='[ENV:APPVERSION_TO_INSTALL]'
 . utils.sh && install_with_unmaintained ucs-test-checks ucs-test-ucsschool
 mkdir -p kelvin_host_tests
 docker cp "$(ucr get appcenter/apps/ucsschool-kelvin-rest-api/container)":"$(univention-app shell ucsschool-kelvin-rest-api sh -c 'ls /kelvin/ucs-test-ucsschool-kelvin-performance_*deb')" kelvin_host_tests/
 apt-get install -y ./kelvin_host_tests/ucs-test-ucsschool-kelvin-performance_*deb
 cp -v /usr/share/ucs-school-import/configs/ucs-school-testuser-import.json /var/lib/ucs-school-import/configs/user_import.json
 . utils-school.sh && set_udm_properties_for_kelvin_api_tests
 univention-app configure ucsschool-kelvin-rest-api --set ucsschool/kelvin/processes=4
 ucr set test/kelvin-performance/cpu-count=4
 univention-app restart ucsschool-kelvin-rest-api
command3:
 ucs-test -F junit -f -E dangerous -s ucsschool-kelvin-performance
 # Stage Locust CSV and HTML results for collection by fetch-results
 mkdir -p test-reports/locust
 ls /var/lib/ucs-test-ucsschool-kelvin-performance/results
 find /var/lib/ucs-test-ucsschool-kelvin-performance/results -name "*.csv" -o -name "*.html" | xargs -I{} cp {} test-reports/locust/ || true
 ls test-reports/locust
 LOCAL /usr/lib/python3/dist-packages/univention/ec2/utils/utils-local.sh fetch-results [SELF_IP] results/[SELF]
command4:
 LOCAL echo "done"
