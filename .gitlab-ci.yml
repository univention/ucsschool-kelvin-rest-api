variables:
  RUN_RENOVATE:
    value: "no"
    options:
      - "yes"
      - "no"
    description: "Set to yes if you want to run renovate"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_OPEN_MERGE_REQUESTS
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_PROTECTED == "true"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "webide"
    - if: $RUN_RENOVATE == "yes"

include:
  - component: $CI_SERVER_FQDN/univention/dev/tooling/ci-components/python-type-hint-coverage-basedpyright@main
    inputs:
      pipeline_stage: build
      python_paths: .
      python_version: "3.11"
      baseline_file: basedpyright-baseline.json
      before_script: []
        # TODO we need to create a baseline with installed packages to lint code using our modules
        # - "apt-get update -qq && apt-get install -y -qq git gcc python3-dev libldap2-dev libsasl2-dev && uv sync --dev"
      job_rules:
        - if: $CI_MERGE_REQUEST_ID
          changes:
            - "**/*.py"
            - pyproject.toml
            - uv.lock
            - basedpyright-baseline.json
        - if: $CI_COMMIT_REF_PROTECTED == "true"
        - if: $CI_COMMIT_TAG
  - local: /.gitlab-ci/gitlab-ci.yml
    rules:
      - if: $RUN_RENOVATE != "yes"
  - project: univention/infrastructure/docker-services
    file:
      - renovatebot/renovate.gitlab-ci.yml
    rules:
      - if: $RUN_RENOVATE == "yes"
